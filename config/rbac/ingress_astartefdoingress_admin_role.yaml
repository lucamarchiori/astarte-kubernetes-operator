# This rule is not used by the project astarte-kubernetes-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over ingress.astarte-platform.org.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: astarte-kubernetes-operator
    app.kubernetes.io/managed-by: kustomize
  name: ingress-astartefdoingress-admin-role
rules:
- apiGroups:
  - ingress.astarte-platform.org
  resources:
  - astartefdoingresses
  verbs:
  - '*'
- apiGroups:
  - ingress.astarte-platform.org
  resources:
  - astartefdoingresses/status
  verbs:
  - get
