name: Tests
on:
  pull_request:
    paths:
    - 'api/**'
    - 'internal/**'
    - 'test/**'
    - 'Makefile'
    # The workflow itself
    - '.github/workflows/test.yaml'
    # And in case dependencies are changed
    - 'go.mod'
  push:
    paths:
    - 'api/**'
    - 'internal/**'
    - 'test/**'
    - 'Makefile'
    # The workflow itself
    - '.github/workflows/test.yaml'
    # And in case dependencies are changed
    - 'go.mod'

jobs:
  unit-tests:
    concurrency:
      group: unit-tests-${{ github.ref }}
      cancel-in-progress: true
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v4
    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version-file: go.mod
    - uses: alexellis/setup-arkade@v3
    - uses: alexellis/arkade-get@master
      with:
        kubectl: v1.32.2
    - name: Ensure Envtest
      run: make envtest
    - name: Running Tests
      run: |
        go mod tidy
        make test
