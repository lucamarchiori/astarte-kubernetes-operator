name: "Operator tests"
on:
  pull_request:
    paths:
    - 'api/**'
    - 'internal/**'
    - 'test/**'
    - 'Makefile'
    # The workflow itself
    - '.github/workflows/test.yaml'
    # And in case dependencies are changed
    - 'go.mod'
  push:
    paths:
    - 'api/**'
    - 'internal/**'
    - 'test/**'
    - 'Makefile'
    # The workflow itself
    - '.github/workflows/test.yaml'
    # And in case dependencies are changed
    - 'go.mod'

jobs:
  e2e-tests:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        kubernetesNodeImage:
        - "kindest/node:v1.33.2@sha256:c55080dc5be4f2cc242e6966fdf97bb62282e1cd818a28223cf536db8b0fddf4"
      fail-fast: false
    concurrency:
      group: 'e2e-tests-${{ github.ref }}-${{ matrix.kubernetesNodeImage }}'
      cancel-in-progress: true
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-go@v5
      with:
        go-version: '1.22.x'
    - uses: alexellis/setup-arkade@v3
    - uses: alexellis/arkade-get@master
      with:
        kubectl: v1.32.2
    - name: Set nf_conntrack_max value
      # This step is required to avoid CrashLoopBackOff for kube-proxy
      # see https://github.com/kubernetes-sigs/kind/issues/2240#issuecomment-838510890
      run: |
        sudo sysctl net/netfilter/nf_conntrack_max=131072
    - uses: container-tools/kind-action@v2
      with:
        version: "v0.29.0"
        node_image: "${{ matrix.kubernetesNodeImage }}"
    - name: Ensure KinD is up
      run: |
        kubectl cluster-info
        kubectl get pods -n kube-system
    - name: Dump cluster info
      run: |
        kubectl cluster-info dump
    - name: Run e2e tests
      run: make test-e2e ignore-not-found=true
    - name: Dump debug info
      if: failure()
      run: |
        kubectl get pods --all-namespaces
        kubectl get deployment --all-namespaces
        kubectl get statefulset --all-namespaces
        kubectl get secrets --all-namespaces
        kubectl get configmaps --all-namespaces
        kubectl get pvc --all-namespaces
        kubectl -n astarte describe astarte || echo "Astarte already deleted"
        kubectl logs deployment/example-astarte-flow || echo "No logs"
        kubectl logs deployment/example-astarte-flow --previous || echo "No logs"
    - name: Show pod states
      run: |
        kubectl get pods

  unit-tests:
    concurrency:
      group: unit-tests-${{ github.ref }}
      cancel-in-progress: true
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-go@v5
      with:
        go-version: '1.22.x'
    - uses: alexellis/setup-arkade@v3
    - uses: alexellis/arkade-get@master
      with:
        kubectl: v1.32.2
    - name: Ensure Envtest
      run: make envtest
    - name: Run unit tests
      run: make test
