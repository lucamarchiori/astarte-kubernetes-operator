name: E2E Tests

on:
  push:
  pull_request:

jobs:
  test-e2e:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        kubernetesNodeImage:
        - "kindest/node:v1.33.7"
        - "kindest/node:v1.32.11"
        - "kindest/node:v1.31.14"
        - "kindest/node:v1.30.13"
      fail-fast: false
    concurrency:
      group: 'e2e-tests-${{ github.ref }}-${{ matrix.kubernetesNodeImage }}'
      cancel-in-progress: true
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-go@v5
      with:
        go-version: '1.22.x'
    - uses: alexellis/setup-arkade@v3
    - uses: alexellis/arkade-get@master
      with:
        kubectl: v1.32.2
    - name: Tune runner sysctl settings
      run: |
        # Fix silent crashes for kubelet and kube-proxy
        sudo sysctl net/netfilter/nf_conntrack_max=131072
    - name: Install kind
      run: go install sigs.k8s.io/kind@v0.31.0
    - name: Verify kind installation
      run: kind version
    - name: Create kind cluster
      run: kind create cluster --image=${{ matrix.kubernetesNodeImage }}
    - name: Ensure KinD is up
      run: |
        kubectl cluster-info
        kubectl get pods -n kube-system
    - name: Dump cluster info
      run: |
        kubectl cluster-info dump
    - name: Run e2e tests
      run: make test-e2e ignore-not-found=true
